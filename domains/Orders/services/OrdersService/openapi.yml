openapi: 3.0.3
info:
  title: Orders Service API
  version: 1.0.0
  description: |
    HTTP API for the Orders Service. Handles placing, retrieving, cancelling, and
    refunding customer orders. Domain events (OrderConfirmed, OrderCancelled,
    OrderRefunded, ...) are published to the orders domain event bus as a side effect
    of these operations.
servers:
  - url: http://localhost:3000
    description: Local development
paths:
  /health:
    get:
      operationId: getHealth
      summary: Service health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: OrdersService
  /orders:
    post:
      operationId: placeOrder
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceOrderCommand'
      responses:
        '202':
          description: Order accepted and processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
                  published:
                    type: object
    get:
      operationId: listOrders
      summary: List all orders
      responses:
        '200':
          description: A list of orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
  /orders/{orderId}:
    get:
      operationId: getOrder
      summary: Fetch a single order by id
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: The order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Order not found
    delete:
      operationId: cancelOrder
      summary: Cancel an order
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '202':
          description: Order cancelled
  /orders/{orderId}/refund:
    post:
      operationId: refundOrder
      summary: Refund an order
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                amount:
                  type: number
      responses:
        '202':
          description: Order refunded
components:
  parameters:
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
  schemas:
    PlaceOrderCommand:
      type: object
      required:
        - orderId
        - userId
        - items
      properties:
        orderId:
          type: string
        userId:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: string
              quantity:
                type: integer
              unitPrice:
                type: number
    Order:
      type: object
      properties:
        orderId:
          type: string
        userId:
          type: string
        status:
          type: string
          enum:
            - confirmed
            - cancelled
            - amended
            - refunded
            - awaiting-stock
        totalAmount:
          type: number
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: string
              quantity:
                type: integer
              unitPrice:
                type: number
              totalPrice:
                type: number
